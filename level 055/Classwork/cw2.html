<!-- Background-ს რამდენიმე კუთვნილება გადაეცემა, background-image კუთვნილება url() ფუნქციის საშუალებით ჩვენ მასში ვწერთ რაიმე სურათის ლინკს რომ ეს სურათი გამოვიყენოთ, როგორც ჩვენი რაიმე ელემენტის ფონი. background-image კუთვნილებას გადაეცემა სავალდებულო ფუნქცია url(), რაშიც ვწერთ ბრწყალებს და შემდეგ იმ სურათის ბმულს რომელიც გვინდა რომ ფონად გამოვიყენოთ. background-repeat კუთვნილება ჩვენს კოდს ეუბნება თუ რამდენჯერ და რა მიმართულებით გამოიყენოს ჩვენი background-image:url()-ში გადაცემული სურათი, მაგალითად: background-repeat: repeat; არის default ავტომატური მნიშვნელობა - ეს კუთვნილება ჩვენს სურათს გამოიყენებს მითითებული ელემენტის ფონად იმდენჯერ რამდენჯერაც ჩაეტევა, x და y ღერძებზე, ჰორიზონტალურად და ვერტიკალურად. background-repeat: no-repeat; ჩვენს გადაცემულ სურათს მხოლოდ ერთხელ გამოიყენებს ელემენტში, იმ შემთხვევაშიც კი თუ ჩვენს ელემენტში მეტი რაოდენობის სურათები ეტევა, და მოათავსებს ჩვენს სურათს ელემენტის ზედა მარცხენა კუთხეში. background-repeat: repeat-x კუთვნილება ჩვენს -->
