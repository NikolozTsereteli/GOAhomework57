<!-- 2) კომენტარებით ახსენით თითოეული position-ის სახე: static, fixed, relative, absolute -->


<!-- position კუთვნილების გამოყენებით ჩვენ შეგვიძლია ელემენტებს მივანიჭოთ რამდენიმე განსხვავებული სახის მდებარეობა და მდგომარეობა. მაგალითად: position:static არის ყველა ელემენტის თავდაპირველი პოზიცია - default მნიშვნელობა, სადაც ჩვენ არ შეგვიძლია გამოვიყენოთ position-ის მნიშვნელობები როგორიცაა left, right, top, bottom. position:fixed - არის ისეთი პოზიცია, რომ ელემენტები fixed პოზიციით არასდროს არ გამოძრავდებიან, მაშინაც კი თუ ეკრანს ავსქროლავთ. position:relative პოზიციის გამოყენების დროს, ელემენტები საკუთარი ჩვეულებრივი მდებარეობიდან გადაადგილდებიან კუთვნილებებით top, bottom, left, right. position:absolute პოზიციის გამოყენების დროს, ელემენტები აღარ ექვემდებარებიან არანაირ წესრიგს და სხვა ელემენტების განლაგებას, და მათი ადგილმდებარეობის გამოთვლა დაიწყება მოწყობილობის (0, 0) კოორდინატებიდან. -->
